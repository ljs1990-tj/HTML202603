<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container > div{
            border : 1px solid black;
            text-align: center;
            padding : 10px;
        }

        #container {
            display: grid;
            gap : 10px;
            grid-template-columns: 200px 1fr;
            grid-template-rows: 150px minmax(600px, auto) 150px;
            grid-template-areas: 
            "header header"
            "side content"
            "footer footer";
        }

        .header {grid-area: header;}
        .side {grid-area: side;}
        .content {grid-area: content;}
        .footer {grid-area: footer;}
    </style>
</head>
<body>
    <div id="container">
        <div class="header">헤더다~~~</div>
        <div class="side">사이드!!</div>
        <div class="content">컨텐츠!!</div>
        <div class="footer">푸터~~</div>
    </div>
</body>
</html>
