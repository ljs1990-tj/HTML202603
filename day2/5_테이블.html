<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, tr, th, td {
            border : 2px solid black; /* 2px 크기의 검은색 선(solid) */
            border-collapse: collapse; /* 겹치는 선을 하나로 */
            padding : 5px 20px; /* 상하 5px 좌우 20px */
            text-align: center; /* 가운데 정렬 */
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td>1</td>
            <td>2</td>
            <td colspan="2">3+4</td>
        </tr>
        <tr>
            <td rowspan="2">5+9</td>
            <td>6</td>
            <td>7</td>
            <td>8</td>
        </tr>
        <tr>
            
            <td>10</td>
            <td>11</td>
            <td>12</td>
        </tr>
    </table>
</body>
</html>
