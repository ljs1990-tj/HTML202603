<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, tr, th, td{
            border : 2px solid black;
            padding : 5px 20px;
            text-align: center;
            border-collapse: collapse;
        }

        tr:nth-child(2){ /* tr태그중에 2번째 요소만 적용*/
            color: blue;
        }

        /* 2n+1, odd 홀수번째 */
        /* 2n, even 짝수번째 */
        tr:nth-child(even){ 
            background-color: #ccc;
        }
        tr:first-child{
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>이름</th>
            <th>자바</th>
            <th>오라클</th>
            <th>html</th>
        </tr>
        <tr>
            <td>홍길동</td>
            <td>90</td>
            <td>95</td>
            <td>85</td>
        </tr>
        <tr>
            <td>김철수</td>
            <td>93</td>
            <td>98</td>
            <td>80</td>
        </tr>
        <tr>
            <td>박영희</td>
            <td>91</td>
            <td>96</td>
            <td>83</td>
        </tr>
        <tr>
            <td>유재석</td>
            <td>95</td>
            <td>95</td>
            <td>95</td>
        </tr>
    </table>
</body>
</html>
