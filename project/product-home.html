<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid 실습 완성본</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>

  <div id="app" class="dashboard-container">

    <div class="box header">
      <div class="header-logo">
        <img src="logo.png" class="logo-image">
      </div>

      <div class="header-search">
        <input v-model="keyword" @keyup.enter="fnList" type="text" placeholder="검색어를 입력하세요...">
        <button type="button" class="search-btn" @click="fnList">검색</button>
      </div>

      <div class="header-utils">
        <button class="notification-btn">
          🔔
          <span class="badge">3</span>
        </button>
        <div class="user-profile">
          <div class="avatar">👨‍💻</div>
          <span class="username">홍길동</span>
        </div>
      </div>
    </div>
    <div class="box side">
      <div class="side-title">카테고리</div>
      <ul class="category-list">
        <li><a href="#" class="active" @click="fnCategory('')">전체 상품</a></li>
        <li><a href="#" @click="fnCategory('스마트폰')">스마트폰</a></li>
        <li><a href="#" @click="fnCategory('게임기')">게임기</a></li>
        <li><a href="#" @click="fnCategory('노트북')">노트북</a></li>
        <li><a href="#" @click="fnCategory('태블릿')">태블릿</a></li>
      </ul>

      <div class="side-title">가격대</div>
      <ul class="filter-list">
        <li><label><input type="checkbox"> 1만원 이하</label></li>
        <li><label><input type="checkbox"> 1만원 ~ 3만원</label></li>
        <li><label><input type="checkbox"> 3만원 ~ 5만원</label></li>
        <li><label><input type="checkbox"> 5만원 이상</label></li>
      </ul>
    </div>

    <div class="box content">
      <div class="product-card" v-for="item in list">
        <img :src="item.IMG_PATH" alt="상품 1" class="product-img">
        <div class="product-info">
          <div class="product-name">{{item.PRODUCT_NAME}}</div>
          <div class="product-category">{{item.CATEGORY}}</div>
          <div class="product-price">{{item.PRICE_WON}}원</div>
        </div>
      </div>
    </div>

    <div class="box footer">하단 영역~~</div>
  </div>

</body>

</html>
<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                list : [],
                keyword : "",
                category : ""
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnList: function () {
                let self = this;
                $.ajax({
                    url: "http://192.168.30.57:3009/product/list",
                    dataType: "json",
                    type: "GET",
                    data: {keyword : self.keyword, brand : "", category : self.category},
                    success: function (data) {
                        console.log(data);
                        self.list = data.productList;
                    }
                });
            },
            fnCategory : function(category){
              let self = this;
              self.category = category;
              self.fnList();
            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
            let self = this;
            self.fnList();
        }
    });

    app.mount('#app');
</script>
