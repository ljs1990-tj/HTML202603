<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img {
            float: left;
        }
    </style>
</head>
<body>
    <!-- BFC(Block Formatting Context) -->
    <!-- 원래대로라면은 div 박스는 float과 겹쳐짐 -->
    <!-- 텍스트 라인은 float를 피해서 배치 -->
    <img src="../media/java.jpg" width="200" height="200" alt="망곰이!!">
    <div>이것은 아주 좋은 자바책입니다.</div>
    <div>단돈 30,000원</div>
    
</body>
</html>
