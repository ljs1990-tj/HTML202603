<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            width: 1000px;
            margin : 5px auto;
        }
        #header{
            width: 100%;
            height: 150px;
            background-color: antiquewhite;
        }
        #left-sidebar{
            width: 200px;
            height: 600px;
            float: left;
            background-color: rgb(190, 156, 222);
            box-sizing: border-box;
        }
        #contents{
            width: 500px;
            height: 600px;
            padding : 10px;
            border: 2px solid black;
            background-color: aqua;
            float: left;

            box-sizing: border-box; /* 패딩이나 border 를 합쳐서 크기를 맞춰준다. */
        }
        #sidebar{
            width: 300px;
            height: 600px;
            background-color: aquamarine;
            float: left;
        }
        #footer{
            width: 100%;
            height: 150px;
            background-color: #eee;
            clear: both;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            검색 기능도 넣고~~ 메뉴도 넣고~~
        </div>
        <div id="left-sidebar">
            메뉴 넣을까~~
        </div>
        <div id="contents">
            주요 기능 넣기~~~~
        </div>
        <div id="sidebar">
            로그인도 넣고 이것저것 넣고~~
        </div>
        <div id="footer">
            사이트정보 넣고~~ 이것저것 넣고~~
        </div>
    </div>
</body>
</html>
