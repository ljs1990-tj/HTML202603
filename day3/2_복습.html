<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            width: 800px;
            margin : 10px auto;
        }
        .txt{
            color:blue;
            font-size: 40px;
            font-weight: bold;
            font-style: italic;
            text-decoration: underline;
            text-align: center;
            text-shadow: 2px 2px 2px black;
        }
        .box1{
            border : 2px solid black;
            width: 200px;
            height: 200px;
            background-color: antiquewhite;
            border-radius: 20px;
        }
        .box2{
            width: 600px;
            background-color: black;
            color: white;
            text-align: center;
            padding : 30px 0px;
        }
        .temp1{
            border : 2px solid black;
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- text css 속성 -->
        <div class="txt">HTML</div> 
        <hr>
        <div class="box1"></div>
        <br>    
        <!-- <span class="temp1">span태그!!</span> -->
         <div class="box2">
            HTML JAVASCRIPT
         </div>
    </div>
</body>
</html>
