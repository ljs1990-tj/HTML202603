<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, tr, th, td {
            border : 2px solid black; /* 2px 크기의 검은색 선(solid) */
            border-collapse: collapse; /* 겹치는 선을 하나로 */
            padding : 5px 20px; /* 상하 5px 좌우 20px */
            text-align: center; /* 가운데 정렬 */
        }
        th{
            background-color: #eee;
        }
        td{
            width: 300px;
            text-align: left;
        }

        span{
            color : green;
        }

        #txt1{
            font-weight: bold;
        }
        .txt2{
            background-color: bisque;
        }
        .txt2:hover{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <!-- 리스트 -->
    <!-- ol, ul -->
    <!-- type 속성을 이용해서 원하는 순서 형태를 정의할 수 있다. -->
    <ol type="A">
        <li>자바</li>
        <li>오라클</li>
        <li>html</li>
    </ol> 
    <!--  -->
    <hr>
    <ul>
        <li>자바</li>
        <li>오라클</li>
        <li>html</li>
    </ul> 
    <hr>
    <!-- 링크 -->
    <a href="../day2/97_연습문제.html">
        <img src="../media/img1.png" width="200" height="200">
    </a> 
    <hr>
    <!-- 테이블 -->
    <table>
        <tr>
            <th>모집 기간</th>
            <td>3월 5일 ~ 3월 10일</td>
        </tr>
    </table> 
    <hr>
    <!-- css를 설정 대상 -->
    <!-- 태그, id, class -->
    <span class="txt2">테스트 1</span>
    <br>
    <span id="txt1">테스트 2</span>
    <br>
    <span class="txt2">테스트 3</span>


    <div style="margin-top:500px;"></div>
</body>
</html>
