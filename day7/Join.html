<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        /* 화면 중앙 정렬 및 배경색 */
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; 
        }

        /* 컨테이너 */
        #app {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 45px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        #container h2 {
            color: #333333;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
        }

        #container p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 입력 필드 영역 */
        .input-group {
            margin-bottom: 18px;
        }

        .input-group span {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #4A90E2;
        }

        /* 버튼 */
        .signup-btn {
            width: 100%;
            padding: 15px;
            background-color: #4A90E2;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 20px;
        }
        .signup-btn-false {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 20px;
        }
        .signup-btn:hover {
            background-color: #357ABD;
        }

           .bottom-links {
            text-align: center;
            font-size: 13px;
            color: #888;
        }

        .bottom-links a {
            color: #4A90E2;
            text-decoration: none;
            font-weight: bold;
        }

        .bottom-links a:hover {
            text-decoration: underline;
        }

        .input-group .userId {
            width: 70%;
        }
        .input-group button{
            margin-left : 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="container">
            <h2>회원가입</h2>
            <p>새로운 계정을 만들어 서비스를 시작하세요.</p>
            
            <div class="input-group">
                <span>이름</span>
                <input type="text" placeholder="홍길동">
            </div>

            <div class="input-group">
                <span>아이디</span>
                <!-- 2. -->
                <!-- 최초 진입 시 버튼 활성화 -->
                <!-- result가 true(아이디 사용 가능)가 되면 비활성화 -->
                <input v-if="!result" class="userId" type="text" v-model="userId" placeholder="아이디를 입력해주세요.">
                <input v-else disabled class="userId" type="text" v-model="userId" placeholder="아이디를 입력해주세요.">
                <button @click="fnCheck">중복체크</button>
            </div>
            
            <div class="input-group">
                <span>비밀번호</span>
                <input type="password" placeholder="8자 이상 입력">
            </div>

            <div class="input-group">
                <span>비밀번호 확인</span>
                <input type="password" placeholder="비밀번호를 다시 입력하세요">
            </div>
            <!-- 3. -->
            <!-- 최초 진입 시 버튼 비활성화 -->
            <!-- result가 true(아이디 사용 가능)가 되면 활성화 -->
            <button v-if="result" class="signup-btn">가입하기</button> 
            <button v-else class="signup-btn-false" disabled>가입하기</button>
            

            <div class="bottom-links">
                이미 계정이 있으신가요? <a href="#">로그인</a>
            </div>
        </div>
    </div>
</body>
</html>
<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                userId : "",
                result : false // 0. 중복 체크 여부
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnCheck : function () {
                let self = this;
                let param = {
                    userId : self.userId
                };
                $.ajax({
                    url: "http://192.168.30.57:3009/id-check",
                    dataType: "json",
                    type: "GET",
                    data : param,
                    success : function (data) {
                        console.log(data);
                        alert(data.message);
                        // 1. 서버로 부터 받은 true(사용가능) or false(불가능)값 result에 넣기
                        self.result = data.success;
                        
                    }
                });
            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
        }
    });

    app.mount('#app');
</script>
