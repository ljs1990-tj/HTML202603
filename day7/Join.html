<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        * {
            box-sizing: border-box;
        }

        /* 화면 중앙 정렬 및 배경색 */
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; 
        }

        /* 컨테이너 */
        #container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 45px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        #container h2 {
            color: #333333;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
        }

        #container p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 입력 필드 영역 */
        .input-group {
            margin-bottom: 18px;
        }

        .input-group span {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #4A90E2;
        }

        /* 버튼 */
        .signup-btn {
            width: 100%;
            padding: 15px;
            background-color: #4A90E2;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        .signup-btn:hover {
            background-color: #357ABD;
        }

           .bottom-links {
            text-align: center;
            font-size: 13px;
            color: #888;
        }

        .bottom-links a {
            color: #4A90E2;
            text-decoration: none;
            font-weight: bold;
        }

        .bottom-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="container">
        <h2>회원가입</h2>
        <p>새로운 계정을 만들어 서비스를 시작하세요.</p>
        
        <div class="input-group">
            <span>이름</span>
            <input type="text" placeholder="홍길동">
        </div>

        <div class="input-group">
            <span>아이디</span>
            <input type="email" placeholder="아이디를 입력해주세요.">
        </div>
        
        <div class="input-group">
            <span>비밀번호</span>
            <input type="password" placeholder="8자 이상 입력">
        </div>

        <div class="input-group">
            <span>비밀번호 확인</span>
            <input type="password" placeholder="비밀번호를 다시 입력하세요">
        </div>
        
        <button class="signup-btn">가입하기</button>
        

        <div class="bottom-links">
            이미 계정이 있으신가요? <a href="#">로그인</a>
        </div>
    </div>
</body>
</html>
